<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI DevHub | Premium AI Developer Ecosystem</title>
    <script>
      // Pre-paint the saved theme before first render to avoid a flash.
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('devhub.theme') || 'dark'); } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
